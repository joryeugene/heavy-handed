# ──────────────────────────────────────────
# Prefix
# ──────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix              # double-tap sends literal Ctrl+a (readline/vim)

# ──────────────────────────────────────────
# General
# ──────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[2 q'
set -s extended-keys on
set -as terminal-features 'xterm-256color:extkeys'
bind-key -n S-Enter send-keys Escape "[13;2u"
set -g mouse on
set -g base-index 1               # windows start at 1
setw -g pane-base-index 1         # panes start at 1
set -g renumber-windows on        # no gaps after closing
set -g history-limit 10000        # match Wezterm scrollback
set -g escape-time 0              # no delay after Esc (critical for Neovim)
set -g focus-events on            # Neovim autoread support
set -gq allow-passthrough on      # lets Kitty/sixel graphics pass through tmux
set -g visual-activity off        # prevents tmux activity alerts from clearing images
set -g bell-action none           # no audio bell when switching windows
set -g monitor-bell off           # don't flag windows with bell icon either
set -g status-position top
set -g detach-on-destroy off      # stay in tmux when killing a session
setw -g automatic-rename on               # rename windows to running command
setw -g automatic-rename-format "#{pane_current_command}"  # show zsh/python/node, not hostname

# ──────────────────────────────────────────
# Splits (visual mnemonics: | and -)
# ──────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"   # backslash alias (no Shift needed)
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ──────────────────────────────────────────
# Pane management
# ──────────────────────────────────────────
# THE FEATURE: merge pane into previous window / break out
bind J join-pane -t !
bind B break-pane

# Move current window to an existing session (prompts for name)
bind M command-prompt -p "Target session:" "move-window -t '%%:'"

# Break current window into a brand new auto-named session
bind P run-shell "NEW=$(tmux new-session -d -P -F '##S') && tmux move-window -s '#{window_id}' -t \"$NEW:\""

# Resize with arrow keys (-r = repeatable, no HJKL shadow conflict)
bind -r Up    resize-pane -U 5
bind -r Down  resize-pane -D 5
bind -r Left  resize-pane -L 5
bind -r Right resize-pane -R 5

# ──────────────────────────────────────────
# Windows & Navigation
# ──────────────────────────────────────────
bind c new-window -c "#{pane_current_path}"
bind C new-window -n "claude" "claude"
bind r command-prompt "rename-window '%%'"

bind a run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' \
    --prompt '  ' \
    --header '  ^a all  ^t tmux  ^g config  ^x zoxide  ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(  )+reload(fd -H -d 2 -t d -E .git . ~)' \
    --preview 'sesh preview {}'
)\""

bind X confirm-before -p "kill session? (y/n)" kill-session
bind L run-shell "sesh last"      # toggle last session (sesh tracks order)

# No-prefix window switching (alt-n/p freed from skhd)
bind -n M-n next-window
bind -n M-p previous-window

# Reorder windows (move tab position)
bind < swap-window -t -1\; select-window -t -1
bind > swap-window -t +1\; select-window -t +1

bind N next-layout                # cycle: even-h → even-v → main-h → main-v → tiled

# No-prefix session switching (alt-y/u freed from skhd)
bind -n M-y switch-client -p     # previous session
bind -n M-u switch-client -n     # next session

# ──────────────────────────────────────────
# Popups (TUI Utilities)
# ──────────────────────────────────────────
bind g display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "lazygit"
bind y display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "yazi"
bind b display-popup -w 90% -h 90% -E "btop"
bind m display-popup -w 90% -h 90% -E "macmon"
bind e display-popup -d "#{pane_current_path}" -w 80% -h 60% -E "zsh"

# Zoxide jump: Uses run-shell + fzf-tmux to match the sesh workflow
bind j run-shell "zoxide query -l | fzf-tmux -p 80%,60% --reverse | xargs -I {} tmux send-keys -t '#{pane_id}' 'cd \"{}\"' Enter"

# ──────────────────────────────────────────
# Utilities & Zen Mode
# ──────────────────────────────────────────
bind S set-option status                 # Toggle status bar (Zen Mode)
bind Y setw synchronize-panes            # Sync panes (type in one, run in all)
bind -r R run-shell 's=$(tmux show -gvq @rotate_state); s=${s:-0}; n=$(( (s+1) % 4 )); tmux set -g @rotate_state "$n"; case "$n" in 0) tmux select-layout even-horizontal ;; 1) tmux select-layout even-vertical ;; 2) tmux select-layout even-horizontal; tmux rotate-window ;; 3) tmux select-layout even-vertical; tmux rotate-window ;; esac'

# ──────────────────────────────────────────
# Sessions (Fuzzy Search)
# ──────────────────────────────────────────
unbind T
# Fuzzy find panes: Unique entries with session, window index, and live content preview
bind f run-shell "tmux list-panes -a -F '##{pane_id} [##{session_name}] ##{window_index}:##{window_name} | ##{pane_current_command} | ##{pane_current_path}' | fzf-tmux -p 90%,70% --reverse --preview 'tmux capture-pane -pt {1}' | cut -d' ' -f1 | xargs -I {} tmux switch-client -t {}"

# ──────────────────────────────────────────
# Clipboard image paste
# ──────────────────────────────────────────
bind V run-shell "~/.config/tmux/scripts/clipboard-image.sh '#{pane_current_path}'"

# ──────────────────────────────────────────
# Copy mode (vim style)
# ──────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# ──────────────────────────────────────────
# Plugins
# ──────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @vim_navigator_pattern '(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'joryeugene/tmux-jumplist'

# ──────────────────────────────────────────
# fzf / extraction plugins
# ──────────────────────────────────────────
set -g @plugin 'Morantron/tmux-fingers'
set -g @fingers-key 'space'

set -g @plugin 'wfxr/tmux-fzf-url'
set -g @fzf-url-history-limit '2000'

set -g @plugin 'roosta/tmux-fuzzback'
set -g @fuzzback-bind '/'
set -g @fuzzback-popup 1
set -g @fuzzback-popup-size '90%'

set -g @plugin 'aomerk/tmux-claude-sessions'
set -g @claude_sessions_key 'o'            # g is lazygit

# ──────────────────────────────────────────
# Neovim integration
# ──────────────────────────────────────────
set -g @plugin 'trevarj/tmux-open-nvim'
set -g @ton-open-strategy ':e'

# Catppuccin config (set options BEFORE running plugin)
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_default_text " #W"
set -g @catppuccin_window_current_text " #W"

# Load catppuccin (defines @thm_* colors + @catppuccin_status_* templates)
run ~/.tmux/plugins/tmux/catppuccin.tmux

# Status bar (MUST come AFTER catppuccin.tmux loads)
set -g status-left "#{E:@catppuccin_status_session}#[fg=#{@thm_fg}]  ❯"
set -g status-left-length 100
set -g status-right "#{E:@catppuccin_status_uptime}"
set -g status-right-length 200

# Initialize TPM (keep at very bottom)
run '~/.tmux/plugins/tpm/tpm'

# Unbind prefix ] (tmux-sensible overrides with slow cross-platform clipboard script)
unbind ]
